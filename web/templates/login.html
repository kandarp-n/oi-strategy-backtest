<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - NIFTY/BANKNIFTY Bot</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
    body { background: #f5f7fa; height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { width: 100%; max-width: 380px; padding: 2rem; background: white; border-radius: 0.75rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  </style>
</head>
<body>
<div class="login-card">
  <h4 class="mb-1">📈 OI-Bot Login</h4>
  <p class="text-muted small mb-4">NIFTY/BANKNIFTY trading bot</p>
  {% if error %}<div class="alert alert-danger py-2">{{ error }}</div>{% endif %}
  <form method="POST" action="/login" autocomplete="off">
    <input type="hidden" name="next" value="{{ next_ }}">
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" class="form-control" name="username" autofocus required>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" name="password" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Sign in</button>
  </form>
  <hr class="my-4">
  <p class="small text-muted mb-0">
    Default username: <code>admin</code>.<br>
    Set <code>WEB_UI_USERNAME</code> / <code>WEB_UI_PASSWORD</code> env vars
    to override. If <code>WEB_UI_PASSWORD</code> isn't set, a random password
    is printed to the server console on startup.
  </p>
</div>
</body>
</html>
